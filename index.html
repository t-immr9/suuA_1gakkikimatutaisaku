<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学A 1学期期末考査対策 〜確率ダンジョン〜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --bg:        #0f1117;
    --surface:   #1a1e2e;
    --card:      #232840;
    --border:    #343a5a;
    --accent:    #7c6aff;
    --accent2:   #ff6a9a;
    --gold:      #f5c842;
    --text:      #e8eaf6;
    --muted:     #8890b8;
    --green:     #4cdc80;
    --red:       #ff5a6a;
    --radius:    14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* ========== SCREENS ========== */
  .screen { display: none; width: 100%; max-width: 480px; }
  .screen.active { display: block; }

  /* ========== TITLE ========== */
  #screen-title {
    text-align: center;
    padding: 40px 24px;
  }
  .title-icon { font-size: 72px; margin-bottom: 16px; display: block; }
  .title-main {
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1.35;
    letter-spacing: 0.02em;
    text-shadow: 0 0 24px rgba(245,200,66,0.5);
    margin-bottom: 8px;
  }
  .title-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
  }
  .title-deco {
    display: flex;
    justify-content: center;
    gap: 12px;
    font-size: 28px;
    margin-bottom: 32px;
    opacity: 0.6;
  }
  .btn-start {
    display: block;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 24px rgba(124,106,255,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-start:active { transform: scale(0.97); box-shadow: none; }

  /* ========== QUESTION ========== */
  #screen-question { padding: 8px 0; }

  .progress-bar-wrap {
    background: var(--surface);
    border-radius: 99px;
    height: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    margin-bottom: 12px;
  }

  /* enemy card */
  .enemy-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .enemy-emoji { font-size: 48px; line-height: 1; }
  .enemy-info { flex: 1; }
  .enemy-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  .enemy-hp-wrap {
    background: #111;
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
  }
  .enemy-hp-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff4444, #ff9944);
    border-radius: 99px;
    transition: width 0.5s;
  }
  .enemy-hp-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* battle message */
  .battle-msg {
    font-size: 13px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 12px;
    min-height: 20px;
    font-weight: 700;
  }

  /* question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .question-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .question-text {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
  }

  /* choices */
  .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .btn-choice {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    line-height: 1.5;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .btn-choice:active { transform: scale(0.98); }
  .btn-choice:not(:disabled):hover {
    background: #2a3050;
    border-color: var(--accent);
  }
  .choice-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--border);
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .btn-choice.correct {
    background: rgba(76,220,128,0.12);
    border-color: var(--green);
    color: var(--green);
  }
  .btn-choice.correct .choice-letter { background: var(--green); color: #000; }
  .btn-choice.incorrect {
    background: rgba(255,90,106,0.12);
    border-color: var(--red);
    color: var(--red);
  }
  .btn-choice.incorrect .choice-letter { background: var(--red); color: #fff; }
  .btn-choice:disabled { cursor: default; }

  /* result box */
  .result-box {
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    display: none;
  }
  .result-box.correct {
    background: rgba(76,220,128,0.1);
    border: 1px solid var(--green);
  }
  .result-box.incorrect {
    background: rgba(255,90,106,0.1);
    border: 1px solid var(--red);
  }
  .result-box.active { display: block; }
  .result-label {
    font-size: 15px;
    font-weight: 900;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-box.correct .result-label { color: var(--green); }
  .result-box.incorrect .result-label { color: var(--red); }
  .explanation-text {
    font-size: 13px;
    line-height: 1.75;
    color: #c8cde8;
  }

  .btn-next {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--surface);
    border: 2px solid var(--accent);
    border-radius: var(--radius);
    color: var(--accent);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-next:hover { background: rgba(124,106,255,0.1); }
  .btn-next:active { transform: scale(0.98); }

  /* ========== STAGE CLEAR ========== */
  #screen-stage-clear { text-align: center; padding: 40px 20px; }
  .stage-clear-icon { font-size: 72px; display: block; margin-bottom: 16px; }
  .stage-clear-title {
    font-size: 24px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(245,200,66,0.5);
    margin-bottom: 8px;
  }
  .stage-clear-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
  }
  .stage-score-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 28px;
  }
  .stage-score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
  }
  .stage-score-row:last-child { border-bottom: none; }
  .stage-score-row .label { color: var(--muted); }
  .stage-score-row .value { font-weight: 700; font-size: 18px; color: var(--text); }
  .stage-score-row.main .value { font-size: 26px; color: var(--gold); }
  .btn-next-stage {
    display: block;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 20px rgba(124,106,255,0.35);
    transition: transform 0.1s;
  }
  .btn-next-stage:active { transform: scale(0.97); }

  /* ========== FINAL ========== */
  #screen-final { text-align: center; padding: 40px 20px; }
  .final-icon { font-size: 72px; display: block; margin-bottom: 16px; }
  .final-title {
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(245,200,66,0.5);
    margin-bottom: 24px;
  }
  .score-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
  }
  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
  }
  .score-row:last-child { border-bottom: none; }
  .score-row .label { color: var(--muted); }
  .score-row .value { font-weight: 700; font-size: 18px; color: var(--text); }
  .score-row.main .value { font-size: 28px; color: var(--gold); }
  .rank-badge {
    display: inline-block;
    padding: 10px 28px;
    border-radius: 99px;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }
  .rank-badge.s { background: rgba(245,200,66,0.2); color: var(--gold); border: 2px solid var(--gold); }
  .rank-badge.a { background: rgba(76,220,128,0.15); color: var(--green); border: 2px solid var(--green); }
  .rank-badge.b { background: rgba(124,106,255,0.15); color: var(--accent); border: 2px solid var(--accent); }
  .rank-badge.c { background: rgba(136,144,184,0.15); color: var(--muted); border: 2px solid var(--muted); }
  .btn-retry {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 20px rgba(124,106,255,0.3);
  }
  .btn-retry:active { transform: scale(0.97); }

  /* ========== VERTICAL FRACTION ========== */
  .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    vertical-align: middle;
    line-height: 1.05;
    margin: 0 0.12em;
    font-size: 1.05em;
  }
  .frac .top {
    border-bottom: 1.5px solid currentColor;
    padding: 0 0.25em 0.08em;
  }
  .frac .bottom {
    padding: 0.08em 0.25em 0;
  }
</style>
</head>
<body>

<!-- TITLE -->
<div id="screen-title" class="screen active">
  <span class="title-icon">🏰</span>
  <div class="title-main">数学A 1学期期末考査対策<br>〜確率ダンジョン〜</div>
  <div class="title-sub">全問制覇して試験に備えよう！</div>
  <div class="title-deco">⚔️ 🛡️ 🔮</div>
  <button class="btn-start" onclick="startGame()">ゲームスタート</button>
</div>

<!-- QUESTION -->
<div id="screen-question" class="screen">
  <div class="progress-label" id="progress-label"></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>

  <div class="enemy-card">
    <div class="enemy-emoji" id="enemy-emoji">👹</div>
    <div class="enemy-info">
      <div class="enemy-name" id="enemy-name">???</div>
      <div class="enemy-hp-wrap">
        <div class="enemy-hp-fill" id="enemy-hp-fill" style="width:100%"></div>
      </div>
      <div class="enemy-hp-label" id="enemy-hp-label">HP ???</div>
    </div>
  </div>

  <div class="battle-msg" id="battle-msg">⚔️ 敵が現れた！</div>

  <div class="question-card">
    <div class="question-label" id="q-label">問題</div>
    <div class="question-text" id="question-text"></div>
  </div>

  <div class="choices" id="choices"></div>

  <div class="result-box" id="result-box">
    <div class="result-label" id="result-label"></div>
    <div class="explanation-text" id="explanation-text"></div>
  </div>

  <button class="btn-next" id="btn-next" onclick="nextQuestion()" style="display:none">次の問題へ ▶</button>
</div>

<!-- STAGE CLEAR -->
<div id="screen-stage-clear" class="screen">
  <span class="stage-clear-icon" id="stage-clear-icon">🌟</span>
  <div class="stage-clear-title" id="stage-clear-title">エリアクリア！</div>
  <div class="stage-clear-sub" id="stage-clear-sub"></div>
  <div class="stage-score-card">
    <div class="stage-score-row main">
      <span class="label">正答率</span>
      <span class="value" id="stage-rate">—</span>
    </div>
    <div class="stage-score-row">
      <span class="label">正解</span>
      <span class="value" id="stage-correct">—</span>
    </div>
    <div class="stage-score-row">
      <span class="label">問題数</span>
      <span class="value" id="stage-total">—</span>
    </div>
  </div>
  <button class="btn-next-stage" id="btn-next-stage" onclick="goNextStage()">次のエリアへ ▶</button>
</div>

<!-- FINAL -->
<div id="screen-final" class="screen">
  <span class="final-icon" id="final-icon">🏆</span>
  <div class="final-title" id="final-title">全エリア制覇！</div>
  <div class="rank-badge" id="rank-badge">Rank S</div>
  <div class="score-card">
    <div class="score-row main">
      <span class="label">総正答率</span>
      <span class="value" id="final-rate">—</span>
    </div>
    <div class="score-row">
      <span class="label">総正解数</span>
      <span class="value" id="final-correct">—</span>
    </div>
    <div class="score-row">
      <span class="label">総問題数</span>
      <span class="value" id="final-total">—</span>
    </div>
  </div>
  <button class="btn-retry" onclick="startGame()">もう一度挑戦する ↩</button>
</div>

<script>
// ========== DATA ==========
const stage1 = {
  id: "stage1",
  title: "旅立ちの草原",
  groups: [
    {
      groupId: "q1",
      groupTitle: "問1",
      questions: [
        {
          id: "1-1",
          type: "choice4",
          question: "1個のさいころを投げる試行において、「4以上の目が出る」という事象を集合で表せ。",
          choices: ["{4, 5, 6}", "{1, 2, 3}", "{2, 4, 6}", "{1, 3, 5}"],
          answer: 0,
          explanation: "さいころの目は1,2,3,4,5,6である。4以上の目は4,5,6なので、事象は{4,5,6}である。"
        },
        {
          id: "1-2",
          type: "choice4",
          question: "1個のさいころを投げる試行において、「素数の目が出る」という事象を集合で表せ。",
          choices: ["{2, 3, 5}", "{1, 2, 3}", "{2, 4, 6}", "{3, 5, 6}"],
          answer: 0,
          explanation: "1から6までのうち、素数は2,3,5である。1は素数ではないので、事象は{2,3,5}である。"
        },
        {
          id: "1-3",
          type: "choice4",
          question: "1個のさいころを投げる試行において、「6の約数の目が出る」という事象を集合で表せ。",
          choices: ["{1, 2, 3, 6}", "{2, 3, 6}", "{1, 3, 5}", "{1, 2, 4, 6}"],
          answer: 0,
          explanation: "6の約数は1,2,3,6である。したがって、事象は{1,2,3,6}である。"
        }
      ]
    },
    {
      groupId: "q11",
      groupTitle: "問11",
      questions: [
        {
          id: "11-1",
          type: "choice4",
          question: "1から100までの番号札100枚から1枚引くとき、番号が10の倍数でない確率を求めよ。",
          choices: ["9/10", "1/10", "89/100", "91/100"],
          answer: 0,
          explanation: "1から100までのうち10の倍数は10,20,...,100の10個。10の倍数でない番号は100−10 = 90個なので、確率は90÷100 = 9/10である。"
        },
        {
          id: "11-2",
          type: "choice4",
          question: "1から100までの番号札100枚から1枚引くとき、番号が6以上である確率を求めよ。",
          choices: ["19/20", "47/50", "3/50", "9/20"],
          answer: 0,
          explanation: "6以上の番号は6から100までで、100−6+1 = 95個ある。したがって、確率は95÷100 = 19/20である。"
        }
      ]
    },
    {
      groupId: "q14",
      groupTitle: "問14",
      questions: [
        {
          id: "14-1",
          type: "choice4",
          question: "1から30までの30枚の番号札から1枚引くとき、その番号が4の倍数または6の倍数である確率を求めよ。",
          choices: ["1/3", "2/5", "3/10", "7/15"],
          answer: 0,
          explanation: "4の倍数は7個、6の倍数は5個、両方に入る12の倍数は2個である。したがって、4の倍数または6の倍数は7+5−2 = 10個。確率は10÷30 = 1/3である。"
        }
      ]
    },
    {
      groupId: "q19",
      groupTitle: "問19",
      questions: [
        {
          id: "19-1",
          type: "choice4",
          question: "4個のさいころを同時に投げるとき、少なくとも1個は奇数の目が出る確率を求めよ。",
          choices: ["15/16", "1/16", "1/2", "7/8"],
          answer: 0,
          explanation: "少なくとも1個は奇数の余事象は、4個すべて偶数であること。1個のさいころで偶数が出る確率は1/2なので、4個すべて偶数の確率は(1/2)⁴ = 1/16。したがって、求める確率は1−1/16 = 15/16である。"
        },
        {
          id: "19-2",
          type: "choice4",
          question: "4個のさいころを同時に投げるとき、少なくとも1個は2以上の目が出る確率を求めよ。",
          choices: ["1295/1296", "5/6", "625/1296", "1/1296"],
          answer: 0,
          explanation: "少なくとも1個は2以上の余事象は、4個すべて1の目が出ること。4個すべて1の確率は(1/6)⁴ = 1/1296。したがって、求める確率は1−1/1296 = 1295/1296である。"
        }
      ]
    },
    {
      groupId: "q23",
      groupTitle: "問23",
      questions: [
        {
          id: "23-1",
          type: "choice4",
          question: "1個のさいころを4回投げるとき、2の目がちょうど3回出る確率を求めよ。",
          choices: ["5/324", "1/216", "25/1296", "1/54"],
          answer: 0,
          explanation: "2の目が出る確率は1/6、出ない確率は5/6である。4回中ちょうど3回出るので、₄C₃×(1/6)³×(5/6) = 4×(1/216)×(5/6) = 5/324である。"
        },
        {
          id: "23-2",
          type: "choice4",
          question: "1枚の硬貨を6回投げるとき、表が5回以上出る確率を求めよ。",
          choices: ["7/64", "3/32", "1/64", "21/64"],
          answer: 0,
          explanation: "表が5回以上とは、表が5回または6回出ることである。表が5回出る場合は ₆C₅ = 6通り、表が6回出る場合は1通り。全体は2⁶ = 64通りなので、確率は7/64である。"
        }
      ]
    },
    {
      groupId: "q26",
      groupTitle: "問26",
      questions: [
        {
          id: "26-1",
          type: "choice4",
          question: "1から20までの番号が書かれた20枚の札がある。偶数の番号の札が出る事象をA、12以下の番号の札が出る事象をBとするとき、P_A(B)を求めよ。",
          choices: ["3/5", "3/10", "1/2", "2/5"],
          answer: 0,
          explanation: "P_A(B)は、Aが起こったときにBが起こる条件付き確率である。偶数は2,4,6,8,10,12,14,16,18,20の10個。そのうち12以下は2,4,6,8,10,12の6個。したがって、P_A(B) = 6÷10 = 3/5である。"
        }
      ]
    },
    {
      groupId: "q29",
      groupTitle: "問29",
      questions: [
        {
          id: "29-1",
          type: "choice4",

// ========== STAGES ==========
const stages = [stage1, stage2, stage3, stage4];

// ========== ENEMY POOL ==========
const ENEMIES = [
  { name: "スライム",       emoji: "🟩", hp: 3 },
  { name: "コウモリ",       emoji: "🦇", hp: 4 },
  { name: "ゴブリン",       emoji: "👺", hp: 5 },
  { name: "スケルトン",     emoji: "💀", hp: 5 },
  { name: "オーク",         emoji: "👹", hp: 6 },
  { name: "マジックアイ",   emoji: "👁️",  hp: 5 },
  { name: "フレイムバット", emoji: "🔥", hp: 6 },
  { name: "ダークナイト",   emoji: "🗡️",  hp: 7 },
  { name: "ドラゴンパップ", emoji: "🐉", hp: 8 },
];

// ========== STATE ==========
let shuffledStages = [];   // ステージの並び（シャッフル済み）
let stageIndex = 0;        // 現在のステージ番号
let queue = [];            // 現ステージの問題キュー
let currentIndex = 0;      // 現ステージ内の問題番号
let stageScore = 0;        // 現ステージの正答数
let totalScore = 0;        // 全ステージ通算正答数
let totalQuestions = 0;    // 全ステージ通算問題数
let answered = false;
let currentEnemy = null;
let enemyHp = 0;

const LETTERS = ["Ａ", "Ｂ", "Ｃ", "Ｄ"];

// ========== MATH FORMATTING ==========
function formatMathText(text) {
  return String(text).replace(/(\d+)\/(\d+)/g, function(match, num, den) {
    return '<span class="frac"><span class="top">' + num + '</span><span class="bottom">' + den + '</span></span>';
  });
}

// ========== UTILS ==========
function shuffleArray(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function shuffleChoices(question) {
  const correctText = question.choices[question.answer];
  const shuffled = shuffleArray(question.choices);
  const newAnswer = shuffled.indexOf(correctText);
  return { ...question, choices: shuffled, answer: newAnswer };
}

function buildQuestionQueue(stage) {
  const shuffledGroups = shuffleArray(stage.groups);
  const q = [];
  for (const group of shuffledGroups) {
    for (const question of group.questions) {
      q.push(shuffleChoices(question));
    }
  }
  return q;
}

function pickEnemy() {
  return ENEMIES[Math.floor(Math.random() * ENEMIES.length)];
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ========== GAME FLOW ==========
function startGame() {
  // ステージをシャッフル
  shuffledStages = shuffleArray(stages);
  stageIndex = 0;
  totalScore = 0;
  totalQuestions = 0;
  startStage();
}

function startStage() {
  const stage = shuffledStages[stageIndex];
  queue = buildQuestionQueue(stage);
  currentIndex = 0;
  stageScore = 0;
  showScreen('screen-question');
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = queue[currentIndex];
  const stageTotal = queue.length;

  // progress（ステージ内）
  document.getElementById('progress-label').textContent =
    `エリア ${stageIndex + 1}/${shuffledStages.length}　問題 ${currentIndex + 1} / ${stageTotal}`;
  document.getElementById('progress-bar').style.width =
    `${(currentIndex / stageTotal) * 100}%`;

  // enemy
  currentEnemy = pickEnemy();
  enemyHp = currentEnemy.hp;
  document.getElementById('enemy-emoji').textContent = currentEnemy.emoji;
  document.getElementById('enemy-name').textContent = currentEnemy.name + ' が現れた！';
  document.getElementById('enemy-hp-fill').style.width = '100%';
  document.getElementById('enemy-hp-label').textContent = `HP ${enemyHp} / ${enemyHp}`;

  // battle msg
  document.getElementById('battle-msg').textContent = '⚔️ さあ、問いに答えよ！';

  // question
  document.getElementById('q-label').textContent = `問題 ${currentIndex + 1}`;
  document.getElementById('question-text').innerHTML = formatMathText(q.question);

  // choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-choice';
    btn.innerHTML = `<span class="choice-letter">${LETTERS[i]}</span><span>${formatMathText(choice)}</span>`;
    btn.onclick = () => checkAnswer(i);
    choicesEl.appendChild(btn);
  });

  // result box reset
  const rb = document.getElementById('result-box');
  rb.className = 'result-box';
  document.getElementById('result-label').innerHTML = '';
  document.getElementById('explanation-text').innerHTML = '';

  // next btn
  document.getElementById('btn-next').style.display = 'none';
}

function checkAnswer(selectedIndex) {
  if (answered) return;
  answered = true;

  const q = queue[currentIndex];
  const correct = q.answer;
  const isCorrect = selectedIndex === correct;

  if (isCorrect) {
    stageScore++;
    totalScore++;
  }
  totalQuestions++;

  // color choices
  const btns = document.querySelectorAll('.btn-choice');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === selectedIndex) btn.classList.add('incorrect');
  });

  // result box
  const rb = document.getElementById('result-box');
  const rl = document.getElementById('result-label');
  const ex = document.getElementById('explanation-text');

  if (isCorrect) {
    rb.className = 'result-box correct active';
    rl.innerHTML = '✅ 正解！ダメージを与えた！';
    document.getElementById('enemy-hp-fill').style.width = '0%';
    document.getElementById('enemy-hp-label').textContent = 'HP 0 / ' + enemyHp;
    document.getElementById('enemy-name').textContent = currentEnemy.name + ' を倒した！';
    document.getElementById('battle-msg').textContent = '💥 クリティカルヒット！';
  } else {
    rb.className = 'result-box incorrect active';
    rl.innerHTML = '❌ 不正解…ダメージを受けた！';
    document.getElementById('enemy-hp-fill').style.width = '100%';
    document.getElementById('battle-msg').textContent = '😵 やられた！次こそ！';
  }

  ex.innerHTML = formatMathText(q.explanation);

  // next button
  const btnNext = document.getElementById('btn-next');
  const isLastQ = currentIndex >= queue.length - 1;
  const isLastStage = stageIndex >= shuffledStages.length - 1;

  if (isLastQ && isLastStage) {
    btnNext.textContent = '総合結果を見る 🏆';
  } else if (isLastQ) {
    btnNext.textContent = 'エリアクリア！ 🌟';
  } else {
    btnNext.textContent = '次の問題へ ▶';
  }
  btnNext.style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= queue.length) {
    // このステージ終了
    showStageClear();
  } else {
    document.getElementById('progress-bar').style.width =
      `${(currentIndex / queue.length) * 100}%`;
    showQuestion();
  }
}

function showStageClear() {
  const stageTotal = queue.length;
  const rate = Math.round((stageScore / stageTotal) * 100);
  const isLastStage = stageIndex >= shuffledStages.length - 1;

  document.getElementById('stage-correct').textContent = `${stageScore} 問`;
  document.getElementById('stage-total').textContent = `${stageTotal} 問`;
  document.getElementById('stage-rate').textContent = `${rate}%`;

  // アイコン・タイトル
  if (rate >= 80) {
    document.getElementById('stage-clear-icon').textContent = '🌟';
    document.getElementById('stage-clear-title').textContent = 'エリアクリア！';
  } else if (rate >= 50) {
    document.getElementById('stage-clear-icon').textContent = '⚔️';
    document.getElementById('stage-clear-title').textContent = 'エリア突破！';
  } else {
    document.getElementById('stage-clear-icon').textContent = '🛡️';
    document.getElementById('stage-clear-title').textContent = 'なんとか突破…';
  }

  const stageName = shuffledStages[stageIndex].title;
  document.getElementById('stage-clear-sub').textContent = `「${stageName}」を制した！`;

  const btnNextStage = document.getElementById('btn-next-stage');
  if (isLastStage) {
    btnNextStage.textContent = '総合結果を見る 🏆';
  } else {
    btnNextStage.textContent = '次のエリアへ ▶';
  }

  showScreen('screen-stage-clear');
}

function goNextStage() {
  stageIndex++;
  if (stageIndex >= shuffledStages.length) {
    showFinalResult();
  } else {
    startStage();
  }
}

function showFinalResult() {
  const rate = Math.round((totalScore / totalQuestions) * 100);

  document.getElementById('final-correct').textContent = `${totalScore} 問`;
  document.getElementById('final-total').textContent = `${totalQuestions} 問`;
  document.getElementById('final-rate').textContent = `${rate}%`;

  let rankClass, rankText, icon, title;
  if (rate >= 90) {
    rankClass = 's'; rankText = 'Rank S'; icon = '🏆'; title = '完璧！圧倒的な実力！';
  } else if (rate >= 70) {
    rankClass = 'a'; rankText = 'Rank A'; icon = '🌟'; title = 'すばらしい！あと一歩！';
  } else if (rate >= 50) {
    rankClass = 'b'; rankText = 'Rank B'; icon = '⚔️'; title = 'もう少し！復習で乗り越えろ！';
  } else {
    rankClass = 'c'; rankText = 'Rank C'; icon = '🔥'; title = '再挑戦して完全制覇を目指せ！';
  }

  document.getElementById('final-icon').textContent = icon;
  document.getElementById('final-title').textContent = title;
  const badge = document.getElementById('rank-badge');
  badge.className = `rank-badge ${rankClass}`;
  badge.textContent = rankText;

  showScreen('screen-final');
}
